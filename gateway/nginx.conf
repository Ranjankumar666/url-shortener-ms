events {
    worker_connections 1024;
}
http {
    # 👇 Trust incoming proxy headers
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # Rate limit zones
    # limit_req_zone $binary_remote_addr zone=redirect_url_limit:10m rate=50r/s;
    # limit_req_zone $binary_remote_addr zone=store_url_limit:10m rate=5r/s;

    server {
        listen 80;


        location /r {
            # limit_req zone=redirect_url_limit burst=100 nodelay;
            proxy_pass http://redirect-url-service:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location /api {
            # limit_req zone=store_url_limit burst=10 nodelay;

            proxy_pass http://store-url-service:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

    }


}
