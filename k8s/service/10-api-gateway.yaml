apiVersion: v1
kind: Service
metadata:
    name: api-gateway
    namespace: url-shortener
spec:
    selector:
        app: api-gateway
    ports:
        - port: 80
          targetPort: 80
    type: LoadBalancer # Change to NodePort if LoadBalancer not available
---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: api-gateway
    namespace: url-shortener
spec:
    replicas: 2
    selector:
        matchLabels:
            app: api-gateway
    template:
        metadata:
            labels:
                app: api-gateway
        spec:
            initContainers:
                - name: wait-for-services
                  image: busybox:1.35
                  command:
                      [
                          'sh',
                          '-c',
                          'until nc -z redirect-url-service 80 && nc -z store-url-service 80; do echo waiting for services; sleep 2; done',
                      ]
            containers:
                - name: nginx
                  image: nginx:alpine3.23
                  ports:
                      - containerPort: 80
                  volumeMounts:
                      - name: nginx-config
                        mountPath: /etc/nginx
                        readOnly: true
                  resources:
                      requests:
                          memory: '64Mi'
                          cpu: '50m'
                      limits:
                          memory: '256Mi'
                          cpu: '200m'
                  livenessProbe:
                      tcpSocket:
                          port: 80
                      initialDelaySeconds: 15
                      periodSeconds: 10
                      failureThreshold: 5
                  readinessProbe:
                      tcpSocket:
                          port: 80
                      initialDelaySeconds: 15
                      periodSeconds: 5
                      failureThreshold: 5
            volumes:
                - name: nginx-config
                  configMap:
                      name: nginx-config
