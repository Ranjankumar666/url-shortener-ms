apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: redis-cache-pvc
    namespace: url-shortener
spec:
    accessModes:
        - ReadWriteOnce
    resources:
        requests:
            storage: 100Mi
---
apiVersion: v1
kind: Service
metadata:
    name: redirect-url-cache
    namespace: url-shortener
spec:
    selector:
        app: redirect-url-cache
    ports:
        - port: 6379
          targetPort: 6379
    clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: redirect-url-cache
    namespace: url-shortener
spec:
    replicas: 1
    selector:
        matchLabels:
            app: redirect-url-cache
    template:
        metadata:
            labels:
                app: redirect-url-cache
        spec:
            containers:
                - name: redis
                  image: redis/redis-stack-server:7.4.0-v8
                  ports:
                      - containerPort: 6379
                  volumeMounts:
                      - name: redis-storage
                        mountPath: /data
                  resources:
                      requests:
                          memory: '64Mi'
                          cpu: '200m'
                      limits:
                          memory: '256Mi'
                          cpu: '500m'
                  livenessProbe:
                      exec:
                          command:
                              - redis-cli
                              - ping
                      initialDelaySeconds: 10
                      periodSeconds: 5
                  readinessProbe:
                      exec:
                          command:
                              - redis-cli
                              - ping
                      initialDelaySeconds: 5
                      periodSeconds: 5
            volumes:
                - name: redis-storage
                  persistentVolumeClaim:
                      claimName: redis-cache-pvc
