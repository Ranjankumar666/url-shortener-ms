apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redirect-url-db-pvc
  namespace: url-shortener
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redirect-url-db
  namespace: url-shortener
spec:
  selector:
    app: redirect-url-db
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None  # Headless service for StatefulSet
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redirect-url-db
  namespace: url-shortener
spec:
  serviceName: redirect-url-db
  replicas: 1
  selector:
    matchLabels:
      app: redirect-url-db
  template:
    metadata:
      labels:
        app: redirect-url-db
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine3.23
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          value: "urls"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        - name: shm
          mountPath: /dev/shm
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - pg_isready -U postgres
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - pg_isready -U postgres
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 128Mi
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: redirect-url-db-pvc
