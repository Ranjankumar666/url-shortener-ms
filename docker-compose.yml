services:
  api-gateway:
    container_name: api-gateway
    image: nginx:alpine3.23
    ports:
      - "8080:80" 
      # - "443:443"
      # - "443:443/udp"
    depends_on:
      - redirect-url-service
      - store-url-service
    networks:
      - backend
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf

  redirect-url-service:
    build: ./redirect-url
    container_name: redirect-url-service
    networks:
      - backend
    depends_on:
      redirect-url-db:
        condition: service_started
      redirect-url-cache:
        condition: service_started
      mq:
        condition: service_started
    environment:
      SERVICE_NAME: REDIRECT-URL-SERVICE
      DB_HOST: redirect-url-db
      DB_NAME: urls
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redirect-url-cache
      REDIS_PORT: 6379
      KAFKA_HOST: mq
      KAFKA_PORT: 9092
      PORT: 80

  store-url-service:
    build: ./store-url
    container_name: store-url-service
    networks:
      - backend
    depends_on:
      store-url-db:
        condition: service_started
      mq:
        condition: service_started
    environment:
      SERVICE_NAME: STORE-URL-SERVICE
      DB_HOST: store-url-db
      DB_NAME: urls
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_HOST: mq
      KAFKA_PORT: 9092
      PORT: 80
      WEB_HOST: http://localhost:8080/r/

  redirect-url-db:
    container_name: redirect-url-db
    image: postgres:16-alpine3.23
    shm_size: 128mb
    networks:
      - backend
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: urls

  store-url-db:
    container_name: store-url-db
    image: postgres:16-alpine3.23
    shm_size: 128mb
    networks:
      - backend
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: urls

  redirect-url-cache:
    container_name: redirect-url-cache
    image: redis/redis-stack-server:7.4.0-v8
    networks:
      - backend

  mq:
    container_name: mq
    image: apache/kafka:4.2.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # Listen inside container
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093

      # Advertise host for other containers
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://mq:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@mq:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

    networks:
      - backend
    # healthcheck:
    #   test:
    #     [
    #       "CMD",
    #       "kafka-topics.sh",
    #       "--bootstrap-server",
    #       "localhost:9092",
    #       "--list",
    #     ]
    #   interval: 10s
    #   retries: 5
networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
